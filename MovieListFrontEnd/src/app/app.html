

<main class="main">
  <mat-toolbar color="primary">
    <span>MovieList</span>
    <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="nav-links">
      <a mat-tab-link routerLink="/movies/popular" routerLinkActive #rla1="routerLinkActive" [active]="rla1.isActive"> Popular </a>
      <a mat-tab-link routerLink="/movies/top_rated" routerLinkActive #rla2="routerLinkActive" [active]="rla2.isActive"> Top Rated </a>
      <a mat-tab-link routerLink="/movies/upcoming" routerLinkActive #rla3="routerLinkActive" [active]="rla3.isActive"> Upcoming </a>
      <a mat-tab-link routerLink="/movies/to-watch" routerLinkActive #rla4="routerLinkActive" [active]="rla4.isActive"> To watch </a>
      <a mat-tab-link routerLink="/movies/watched" routerLinkActive #rla5="routerLinkActive" [active]="rla5.isActive"> Watched </a>
    </nav>
    <span class="spacer"></span>
    <mat-form-field appearance="outline" class ="search-field">
      <mat-label>Search</mat-label>
      <input matInput [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" placeholder="Search...">
    </mat-form-field>
  </mat-toolbar>
  <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
</main>



<router-outlet />
